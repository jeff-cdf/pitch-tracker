<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pitch Tracker">
<meta name="theme-color" content="#0f1923">
<title>Pitch Tracker — 13U</title>
<style>
  

  :root {
    --bg: #0f1923;
    --bg2: #162030;
    --bg3: #1d2d40;
    --bg4: #243548;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8edf2;
    --text2: #8a9bb0;
    --text3: #506070;
    --accent: #3b82f6;
    --accent-bg: rgba(59,130,246,0.12);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --purple: #a78bfa;
    --purple-bg: rgba(167,139,250,0.12);
    --teal: #2dd4bf;
    --teal-bg: rgba(45,212,191,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --mono: 'SF Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; overscroll-behavior: none; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  .top-bar { padding: 52px 16px 12px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .top-bar h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .top-bar .sub { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px 24px; }
  .bottom-nav { display: flex; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
  .bnav { flex: 1; padding: 10px 4px 8px; border: none; background: transparent; color: var(--text3); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 9px; font-family: var(--font); letter-spacing: 0.3px; transition: color .15s; }
  .bnav svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .bnav.active { color: var(--accent); }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .card-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 10px; font-family: var(--mono); }

  /* METRICS */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .metric { background: var(--bg3); border-radius: var(--radius-sm); padding: 12px; }
  .metric .lbl { font-size: 10px; color: var(--text3); margin-bottom: 4px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .06em; }
  .metric .val { font-size: 26px; font-weight: 600; line-height: 1; letter-spacing: -0.5px; }
  .metric .sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* FORMS */
  label { font-size: 12px; color: var(--text3); display: block; margin-bottom: 5px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; }
  input, select { width: 100%; padding: 11px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg3); color: var(--text); font-size: 15px; font-family: var(--font); -webkit-appearance: none; appearance: none; outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .form-full { margin-bottom: 10px; }

  /* STEPPERS */
  .stepper { display: flex; align-items: center; border: 1px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; height: 56px; background: var(--bg3); }
  .stepper button { flex: 0 0 44px; height: 56px; border: none; background: var(--bg4); color: var(--text); font-size: 24px; cursor: pointer; font-family: var(--font); display: flex; align-items: center; justify-content: center; transition: background .1s; user-select: none; }
  .stepper button:active { background: var(--border2); }
  .stepper input { flex: 1; border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); border-radius: 0; height: 56px; font-size: 28px; font-weight: 700; text-align: center; background: var(--bg3); color: var(--text); font-family: var(--mono); outline: none; padding: 0; }

  /* BUTTONS */
  .btn { padding: 14px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; font-size: 15px; font-family: var(--font); width: 100%; transition: all .15s; text-align: center; display: block; font-weight: 500; }
  .btn:active { transform: scale(0.98); opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn-success { background: var(--green); color: #fff; border-color: transparent; }
  .btn-sm { padding: 8px 14px; font-size: 13px; width: auto; display: inline-block; }
  .btn-danger { color: var(--red); border-color: transparent; background: var(--red-bg); }
  .btn-ghost { color: var(--text2); }

  /* BADGES & TAGS */
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; font-family: var(--mono); }
  .b-blue { background: var(--accent-bg); color: var(--accent); }
  .b-green { background: var(--green-bg); color: var(--green); }
  .b-amber { background: var(--amber-bg); color: var(--amber); }
  .b-red { background: var(--red-bg); color: var(--red); }
  .b-purple { background: var(--purple-bg); color: var(--purple); }
  .b-teal { background: var(--teal-bg); color: var(--teal); }
  .hb { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; font-family: var(--mono); margin-left: 4px; }
  .rhp { background: rgba(59,130,246,0.2); color: #93c5fd; }
  .lhp { background: rgba(167,139,250,0.2); color: #c4b5fd; }
  .rhb { background: rgba(245,158,11,0.2); color: #fcd34d; }
  .lhb { background: rgba(45,212,191,0.2); color: #5eead4; }
  .tag-fb { background: rgba(59,130,246,0.15); color: #93c5fd; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; display: inline-block; font-family: var(--mono); }
  .tag-ch { background: rgba(34,197,94,0.15); color: #86efac; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; display: inline-block; font-family: var(--mono); }
  .tag-brk { background: rgba(245,158,11,0.15); color: #fcd34d; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; display: inline-block; font-family: var(--mono); }
  .tag-2fb { background: rgba(239,68,68,0.15); color: #fca5a5; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; display: inline-block; font-family: var(--mono); }

  /* LIST ROWS */
  .row-item { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .row-item:last-child { border-bottom: none; }
  .avatar { border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; font-family: var(--mono); }

  /* PITCH BUDGET */
  .budget-bar { height: 6px; border-radius: 3px; background: var(--bg4); overflow: hidden; margin-top: 4px; }
  .budget-fill { height: 100%; border-radius: 3px; transition: width .4s; }

  /* TYPE TOGGLE */
  .type-toggle { display: flex; border: 1px solid var(--border2); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 12px; }
  .type-toggle button { flex: 1; padding: 12px; border: none; background: transparent; font-size: 14px; font-family: var(--font); color: var(--text2); cursor: pointer; transition: all .15s; font-weight: 500; }
  .type-toggle button.active { background: var(--accent); color: #fff; }
  .type-toggle button:not(:last-child) { border-right: 1px solid var(--border2); }

  /* TAB BAR */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; background: var(--bg3); padding: 3px; border-radius: var(--radius-sm); }
  .tab-bar button { flex: 1; padding: 8px 4px; border: none; background: transparent; border-radius: 6px; font-size: 12px; font-family: var(--font); color: var(--text3); cursor: pointer; transition: all .15s; font-weight: 500; }
  .tab-bar button.active { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }

  /* MATCHUP CARDS */
  .mu-card { border-radius: var(--radius); padding: 14px; margin-bottom: 8px; border: 1px solid var(--border); background: var(--bg2); }
  .mu-card.rank-1 { border-color: var(--green); background: var(--green-bg); }
  .mu-card.rank-2 { border-color: var(--accent); background: var(--accent-bg); }
  .score-ring { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; border: 2px solid; font-family: var(--mono); }

  /* TOURNAMENT CARDS */
  .t-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
  .t-card.active-t { border-color: var(--accent); }
  .limit-input { width: 64px; padding: 6px 8px; font-size: 15px; font-weight: 600; text-align: center; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg4); color: var(--text); font-family: var(--mono); outline: none; }

  /* ALERTS */
  .alert { padding: 11px 13px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 10px; }
  .alert-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .alert-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

  .empty { text-align: center; padding: 32px 0; color: var(--text3); font-size: 13px; }
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  .avail-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-left: 5px; vertical-align: middle; }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>Pitch Tracker</h1>
    <div class="sub" id="team-sub">13U · loading...</div>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div id="page-dash" class="page active">
      <div id="dash-active-t"></div>
      <div class="metric-grid" id="dash-metrics"></div>
      <div class="card">
        <div class="card-title">Pitch budget — this weekend</div>
        <div id="dash-weekend"></div>
      </div>
      <div class="card">
        <div class="card-title">Recent sessions</div>
        <div id="dash-recent"></div>
      </div>
    </div>

    <!-- LOG -->
    <div id="page-log" class="page">
      <div id="log-alert"></div>
      <div class="type-toggle">
        <button class="active" id="tt-bp" onclick="setType('bullpen')">Bullpen</button>
        <button id="tt-game" onclick="setType('game')">Game</button>
      </div>
      <div class="card">
        <div class="form-row">
          <div><label>Pitcher</label><select id="log-pitcher"><option value="">— select —</option></select></div>
          <div><label>Tournament</label><select id="log-tournament"><option value="">— select —</option></select></div>
        </div>
        <div class="form-row">
          <div><label>Date</label><input type="date" id="log-date"></div>
          <div><label>Opponent</label><input type="text" id="log-opp" placeholder="Team name"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Pitches</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <div><label style="text-align:center"><span class="tag-fb">4FB</span></label><div class="stepper"><button onclick="step('fb',-1)">−</button><input type="number" id="log-fb" value="0" min="0" oninput="calcTotals()"><button onclick="step('fb',1)">+</button></div></div>
          <div><label style="text-align:center"><span class="tag-2fb">2FB</span></label><div class="stepper"><button onclick="step('2fb',-1)">−</button><input type="number" id="log-2fb" value="0" min="0" oninput="calcTotals()"><button onclick="step('2fb',1)">+</button></div></div>
          <div><label style="text-align:center"><span class="tag-ch">CH</span></label><div class="stepper"><button onclick="step('ch',-1)">−</button><input type="number" id="log-ch" value="0" min="0" oninput="calcTotals()"><button onclick="step('ch',1)">+</button></div></div>
          <div><label style="text-align:center"><span class="tag-brk">BRK</span></label><div class="stepper"><button onclick="step('brk',-1)">−</button><input type="number" id="log-brk" value="0" min="0" oninput="calcTotals()"><button onclick="step('brk',1)">+</button></div></div>
        </div>
        <div style="display:flex;justify-content:space-between;padding:4px 2px 10px;font-size:13px;color:var(--text2);font-family:var(--mono)">
          <span>Total: <strong id="log-total" style="color:var(--text)">0</strong></span>
          <span>K%: <strong id="log-kpct" style="color:var(--text)">—</strong></span>
        </div>
        <div class="form-row">
          <div><label>Strikes</label><div class="stepper"><button onclick="step('strikes',-1)">−</button><input type="number" id="log-strikes" value="0" min="0" oninput="calcTotals()"><button onclick="step('strikes',1)">+</button></div></div>
          <div><label>Walks (BB)</label><div class="stepper"><button onclick="step('bb',-1)">−</button><input type="number" id="log-bb" value="0" min="0"><button onclick="step('bb',1)">+</button></div></div>
        </div>
      </div>
      <div class="card" id="game-card" style="display:none">
        <div class="card-title">Game stats</div>
        <div class="form-row">
          <div><label>IP</label><div class="stepper"><button onclick="step('ip',-0.1)">−</button><input type="number" id="log-ip" value="0.0" step="0.1"><button onclick="step('ip',0.1)">+</button></div></div>
          <div><label>Strikeouts</label><div class="stepper"><button onclick="step('so',-1)">−</button><input type="number" id="log-so" value="0"><button onclick="step('so',1)">+</button></div></div>
        </div>
        <div class="form-row">
          <div><label>Hits</label><div class="stepper"><button onclick="step('h',-1)">−</button><input type="number" id="log-h" value="0"><button onclick="step('h',1)">+</button></div></div>
          <div><label>Earned runs</label><div class="stepper"><button onclick="step('er',-1)">−</button><input type="number" id="log-er" value="0"><button onclick="step('er',1)">+</button></div></div>
        </div>
        <div class="form-row">
          <div><label>AB faced</label><div class="stepper"><button onclick="step('ab',-1)">−</button><input type="number" id="log-ab" value="0"><button onclick="step('ab',1)">+</button></div></div>
          <div><label>HBP</label><div class="stepper"><button onclick="step('hbp',-1)">−</button><input type="number" id="log-hbp" value="0"><button onclick="step('hbp',1)">+</button></div></div>
        </div>
        <div class="divider"></div>
        <div class="card-title">RISP</div>
        <div class="form-row">
          <div><label>AB w/ RISP</label><div class="stepper"><button onclick="step('risp-ab',-1)">−</button><input type="number" id="log-risp-ab" value="0"><button onclick="step('risp-ab',1)">+</button></div></div>
          <div><label>Hits w/ RISP</label><div class="stepper"><button onclick="step('risp-h',-1)">−</button><input type="number" id="log-risp-h" value="0"><button onclick="step('risp-h',1)">+</button></div></div>
        </div>
        <div class="form-row" style="margin-top:4px">
          <div><label>Result</label><select id="log-result" style="height:52px"><option value="">—</option><option value="W">Win</option><option value="L">Loss</option><option value="ND">No decision</option><option value="S">Save</option></select></div>
          <div><label>Notes</label><input type="text" id="log-notes" placeholder="Optional"></div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveSession()">Save session</button>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="clearLog()">Clear</button>
    </div>

    <!-- MATCHUP -->
    <div id="page-matchup" class="page">
      <div id="matchup-alert"></div>
      <div class="tab-bar">
        <button class="active" onclick="switchMTab('recommend',this)">Recommend</button>
        <button onclick="switchMTab('scout',this)">Scout team</button>
      </div>
      <div id="mt-recommend">
        <div class="card">
          <div class="form-row" style="margin-bottom:8px">
            <div><label>Tournament</label><select id="mu-t" onchange="renderMatchup()" style="height:44px"><option value="">— select —</option></select></div>
            <div><label>Scouted team</label><select id="mu-opp" onchange="renderMatchup()" style="height:44px"><option value="">— optional —</option></select></div>
          </div>
          <div class="card-title">Quick lineup (name · BA · hand)</div>
          <div id="mu-quick"></div>
          <button class="btn btn-sm" style="margin-top:8px;border-color:var(--border2)" onclick="addQuickBatter()">+ Batter</button>
        </div>
        <div id="mu-results"></div>
      </div>
      <div id="mt-scout" style="display:none">
        <div class="card">
          <div class="form-full"><label>Team name</label><input type="text" id="scout-name" placeholder="e.g. Blue Jays"></div>
          <div class="card-title">Batters</div>
          <div id="scout-list"></div>
          <button class="btn btn-sm" style="margin-top:8px;border-color:var(--border2)" onclick="addScoutBatter()">+ Batter</button>
        </div>
        <button class="btn btn-primary" onclick="saveScout()">Save scouted team</button>
      </div>
    </div>

    <!-- TOURNAMENTS -->
    <div id="page-tournaments" class="page">
      <div id="t-alert"></div>
      <div class="tab-bar">
        <button class="active" onclick="switchTTab('list',this)">All tournaments</button>
        <button onclick="switchTTab('add',this)">Add new</button>
      </div>
      <div id="tt-list"><div id="tournament-list"></div></div>
      <div id="tt-add" style="display:none">
        <div class="card">
          <div class="form-row"><div><label>Name</label><input type="text" id="t-name" placeholder="Tournament name"></div><div><label>Dates</label><input type="text" id="t-dates" placeholder="e.g. 3/21-3/22"></div></div>
          <div class="form-row"><div><label>Location</label><input type="text" id="t-loc" placeholder="City, ST"></div><div><label>League</label><input type="text" id="t-league" placeholder="e.g. USSSA"></div></div>
          <div class="form-full"><label>Pitch limit</label><input type="number" id="t-limit" placeholder="85" style="font-size:15px"></div>
          <button class="btn btn-primary btn-sm" onclick="addTournament()">Create tournament</button>
        </div>
      </div>
    </div>

    <!-- ROSTER -->
    <div id="page-roster" class="page">
      <div id="roster-alert"></div>
      <div class="tab-bar">
        <button class="active" onclick="switchRTab('list',this)">Roster</button>
        <button onclick="switchRTab('stats',this)">Stats</button>
        <button onclick="switchRTab('add',this)">Add player</button>
      </div>
      <div id="rt-list"><div id="roster-list"></div></div>
      <div id="rt-stats" style="display:none">
        <div class="form-full"><label>Filter by tournament</label><select id="roster-t-filter" onchange="renderRosterStats()" style="height:48px"><option value="">All time</option></select></div>
        <div id="roster-stats-table"></div>
      </div>
      <div id="rt-add" style="display:none">
        <div class="card">
          <div class="form-row"><div><label>Name</label><input type="text" id="r-name" placeholder="First Last"></div><div><label>Jersey #</label><input type="number" id="r-num" placeholder="0" style="text-align:left;font-size:15px;font-weight:400"></div></div>
          <div class="form-row"><div><label>Throws</label><select id="r-pos" style="height:52px"><option value="RHP">RHP</option><option value="LHP">LHP</option></select></div><div style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="addPitcher()">Add pitcher</button></div></div>
        </div>
      </div>
    </div>

  </div><!-- end .content -->

  <div class="bottom-nav">
    <button class="bnav active" id="bn-dash" onclick="goPage('dash',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dash
    </button>
    <button class="bnav" id="bn-log" onclick="goPage('log',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Log
    </button>
    <button class="bnav" id="bn-matchup" onclick="goPage('matchup',this)">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Matchup
    </button>
    <button class="bnav" id="bn-tournaments" onclick="goPage('tournaments',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Events
    </button>

const AVAILABILITY={

  'p2':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p5':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p6':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p7':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p8':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p10':['t1'],'p11':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p12':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p14':['t1'],'p16':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p17':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p18':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p23':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p27':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p31':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p42':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p43':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p44':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p45':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
  'p99':['t1','t2','t3','t4','t5','t6','t7','t8','t9','t10','t11','t12','t13','t14','t15'],
};

const KEY='pt_standalone_v1';
let S={pitchers:[],sessions:[],tournaments:[],scoutedTeams:[],activeTournamentId:null,_seeded:false};
let qbCount=0,sbCount=0;

function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function load(){
  try{const d=localStorage.getItem(KEY);if(d)S=JSON.parse(d);}catch(e){}
  const gavin=S.pitchers.find(p=>p.id==='p31'||p.name==='Gavin');
  if(gavin)gavin.pos='LHP';
  S.tournaments.forEach(t=>{const seed=SEED_TOURNAMENTS.find(s=>s.id===t.id);if(seed&&t.pitchLimit===undefined)t.pitchLimit=seed.pitchLimit;});
  if(!S._seeded){
    S.pitchers=SEED_PITCHERS.map(p=>({...p}));
    S.tournaments=SEED_TOURNAMENTS.map(t=>({...t}));
    S.activeTournamentId='t1';S._seeded=true;save();
  }
  document.getElementById('log-date').value=new Date().toISOString().split('T')[0];
  renderAll();
}

function getLimit(tid){const t=S.tournaments.find(t=>t.id===tid);return(t&&t.pitchLimit)?t.pitchLimit:DEFAULT_LIMIT;}
function ini(n){return(n||'').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);}
function ac(i){return{bg:ABGS[i%ABGS.length],fg:AFGS[i%AFGS.length]};}
function pIdx(n){return S.pitchers.findIndex(p=>p.name===n);}
function pSess(name,type=null,tid=null){return S.sessions.filter(s=>s.pitcher===name&&(!type||s.type===type)&&(!tid||s.tournamentId===tid));}
function weekendP(name,tid){if(!tid)return 0;return S.sessions.filter(s=>s.pitcher===name&&s.tournamentId===tid).reduce((a,s)=>a+s.total,0);}
function isAvail(pid,tid){if(!tid)return true;const av=AVAILABILITY[pid];return av?av.includes(tid):true;}

function renderAll(){
  document.getElementById('team-sub').textContent=`13U · ${S.pitchers.length} pitchers`;
  renderDash();renderRoster();renderTournaments();updateAllSelects();
}

function goPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  document.querySelector('.content').scrollTop=0;
  if(id==='dash')renderDash();
  if(id==='matchup'){updateAllSelects();renderMatchup();}
  if(id==='roster')renderRoster();
  if(id==='tournaments')renderTournaments();
}

function showAlert(pg,msg,type){
  const el=document.getElementById(pg+'-alert');if(!el)return;
  el.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(()=>el.innerHTML='',3000);
}

function setType(t){
  document.getElementById('tt-bp').classList.toggle('active',t==='bullpen');
  document.getElementById('tt-game').classList.toggle('active',t==='game');
  document.getElementById('game-card').style.display=t==='game'?'block':'none';
}
function currentType(){return document.getElementById('tt-game').classList.contains('active')?'game':'bullpen';}

function step(id,delta){
  const el=document.getElementById('log-'+id);if(!el)return;
  let v=parseFloat(el.value)||0;v=Math.max(0,Math.round((v+delta)*10)/10);
  el.value=id==='ip'?v.toFixed(1):Math.round(v);calcTotals();
}
function calcTotals(){
  const fb=+document.getElementById('log-fb').value||0;
  const fb2=+document.getElementById('log-2fb').value||0;
  const ch=+document.getElementById('log-ch').value||0;
  const brk=+document.getElementById('log-brk').value||0;
  const total=fb+fb2+ch+brk;
  document.getElementById('log-total').textContent=total;
  const str=+document.getElementById('log-strikes').value||0;
  document.getElementById('log-kpct').textContent=total>0?Math.round(str/total*100)+'%':'—';
}

function saveSession(){
  const pitcher=document.getElementById('log-pitcher').value;
  const date=document.getElementById('log-date').value;
  if(!pitcher||!date){showAlert('log','Select a pitcher and date','danger');return;}
  const fb=+document.getElementById('log-fb').value||0;
  const fb2=+document.getElementById('log-2fb').value||0;
  const ch=+document.getElementById('log-ch').value||0;
  const brk=+document.getElementById('log-brk').value||0;
  const total=fb+fb2+ch+brk;
  if(!total){showAlert('log','Enter at least one pitch','danger');return;}
  const strikes=+document.getElementById('log-strikes').value||0;
  const type=currentType();
  const tid=document.getElementById('log-tournament').value||null;
  const sess={
    id:Date.now(),type,date,pitcher,tournamentId:tid,
    opponent:document.getElementById('log-opp').value||'',
    fb,fb2,ch,brk,total,strikes,kpct:total>0?Math.round(strikes/total*100):0,
    bb:+document.getElementById('log-bb').value||0,
    ip:type==='game'?parseFloat(document.getElementById('log-ip').value)||0:0,
    so:type==='game'?+document.getElementById('log-so').value||0:0,
    h:type==='game'?+document.getElementById('log-h').value||0:0,
    er:type==='game'?+document.getElementById('log-er').value||0:0,
    hbp:type==='game'?+document.getElementById('log-hbp').value||0:0,
    ab:type==='game'?+document.getElementById('log-ab').value||0:0,
    rispAb:type==='game'?+document.getElementById('log-risp-ab').value||0:0,
    rispH:type==='game'?+document.getElementById('log-risp-h').value||0:0,
    result:type==='game'?document.getElementById('log-result').value:'',
    notes:type==='game'?document.getElementById('log-notes').value:'',
  };
  S.sessions.unshift(sess);save();renderAll();
  showAlert('log',`Saved — ${pitcher} · ${total} pitches`,'success');clearLog();
}

function clearLog(){
  ['fb','2fb','ch','brk','strikes','bb','so','h','er','hbp','ab','risp-ab','risp-h'].forEach(id=>{const el=document.getElementById('log-'+id);if(el)el.value=0;});
  const ip=document.getElementById('log-ip');if(ip)ip.value='0.0';
  ['log-result','log-notes','log-opp'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  calcTotals();
}

function updateAllSelects(){
  const lp=document.getElementById('log-pitcher');const lpv=lp.value;
  lp.innerHTML='<option value="">— pitcher —</option>';
  S.pitchers.forEach(p=>{const o=document.createElement('option');o.value=p.name;o.textContent=`${p.name} #${p.num}`;lp.appendChild(o);});
  lp.value=lpv;
  ['log-tournament','mu-t'].forEach(sid=>{
    const el=document.getElementById(sid);if(!el)return;
    const v=el.value;
    el.innerHTML='<option value="">— tournament —</option>';
    S.tournaments.forEach(t=>{const o=document.createElement('option');o.value=t.id;o.textContent=`${t.name} (${t.dates||''})`;el.appendChild(o);});
    if(v)el.value=v;else if(S.activeTournamentId)el.value=S.activeTournamentId;
  });
  const rtf=document.getElementById('roster-t-filter');if(rtf){const v=rtf.value;rtf.innerHTML='<option value="">All time</option>';S.tournaments.forEach(t=>{const o=document.createElement('option');o.value=t.id;o.textContent=t.name;rtf.appendChild(o);});rtf.value=v;}
  const muOpp=document.getElementById('mu-opp');if(muOpp){const v=muOpp.value;muOpp.innerHTML='<option value="">— scouted team —</option>';S.scoutedTeams.forEach(t=>{const o=document.createElement('option');o.value=t.id;o.textContent=t.name;muOpp.appendChild(o);});muOpp.value=v;}
}

function renderDash(){
  const tid=S.activeTournamentId;
  const activeT=S.tournaments.find(t=>t.id===tid);
  const limit=tid?getLimit(tid):DEFAULT_LIMIT;
  const dashT=document.getElementById('dash-active-t');
  if(activeT){
    const ts=S.sessions.filter(s=>s.tournamentId===tid);
    const tg=ts.filter(s=>s.type==='game');
    dashT.innerHTML=`<div class="t-card active-t" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:600;font-size:15px">${activeT.name} <span class="badge b-teal">Active</span></div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--mono)">${activeT.dates||''}${activeT.location?' · '+activeT.location:''}${activeT.league?' · '+activeT.league:''}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">${ts.length} sessions · ${tg.length} games · <span style="color:var(--amber)">${limit}p limit</span></div>
        </div>
      </div>
    </div>`;
  } else {
    dashT.innerHTML=`<div class="empty" style="padding:14px 0">No active tournament — go to Events tab</div>`;
  }
  const tSess=tid?S.sessions.filter(s=>s.tournamentId===tid):S.sessions;
  const tot=tSess.reduce((a,s)=>a+s.total,0);
  const str=tSess.reduce((a,s)=>a+s.strikes,0);
  const gms=tSess.filter(s=>s.type==='game');
  const ip=gms.reduce((a,s)=>a+s.ip,0);
  const er=gms.reduce((a,s)=>a+s.er,0);
  document.getElementById('dash-metrics').innerHTML=`
    <div class="metric"><div class="lbl">Pitches</div><div class="val">${tot}</div><div class="sub">${tSess.length} sessions</div></div>
    <div class="metric"><div class="lbl">Team K%</div><div class="val">${tot>0?Math.round(str/tot*100)+'%':'—'}</div><div class="sub">All sessions</div></div>
    <div class="metric"><div class="lbl">Team ERA</div><div class="val">${ip>0?(er/ip*9).toFixed(2):'—'}</div><div class="sub">${gms.length} games</div></div>
    <div class="metric"><div class="lbl">Pitch limit</div><div class="val" style="color:var(--amber)">${limit}</div><div class="sub">This event</div></div>
  `;
  const wc=document.getElementById('dash-weekend');wc.innerHTML='';
  const activePitchers=tid?S.pitchers.filter(p=>isAvail(p.id,tid)):S.pitchers;
  if(!activePitchers.length){wc.innerHTML='<div class="empty">No pitchers for this tournament</div>';return;}
  activePitchers.forEach((p,i)=>{
    const idx=pIdx(p.name);const c=ac(idx>=0?idx:i);
    const wp=weekendP(p.name,tid);const rem=Math.max(0,limit-wp);
    const pct=Math.min(100,Math.round(wp/limit*100));
    const col=pct>=90?'var(--red)':pct>=65?'var(--amber)':'var(--green)';
    const d=document.createElement('div');d.className='row-item';
    d.innerHTML=`<div class="avatar" style="background:${c.bg};color:${c.fg};width:34px;height:34px;font-size:11px;font-family:var(--mono)">${ini(p.name)}</div>
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between;font-size:13px">
        <span style="font-weight:600">${p.name} <span class="hb ${p.pos==='LHP'?'lhp':'rhp'}">${p.pos}</span></span>
        <span style="font-weight:600;color:${col};font-family:var(--mono)">${wp}/${limit}</span>
      </div>
      <div class="budget-bar"><div class="budget-fill" style="width:${pct}%;background:${col}"></div></div>
    </div><span style="font-size:11px;color:${col};min-width:46px;text-align:right;font-family:var(--mono)">${rem} left</span>`;
    wc.appendChild(d);
  });
  const rec=S.sessions.slice(0,5);
  const rel=document.getElementById('dash-recent');
  if(!rec.length){rel.innerHTML='<div class="empty">No sessions yet</div>';return;}
  rel.innerHTML='';
  rec.forEach(s=>{
    const i=pIdx(s.pitcher);const c=ac(i>=0?i:0);
    const t=S.tournaments.find(t=>t.id===s.tournamentId);
    const tb=s.type==='bullpen'?'<span class="badge b-blue">BP</span>':'<span class="badge b-teal">Game</span>';
    const rb=s.result?`<span class="badge ${s.result==='W'?'b-green':s.result==='L'?'b-red':'b-amber'}">${s.result}</span>`:'';
    const d=document.createElement('div');d.className='row-item';
    d.innerHTML=`<div class="avatar" style="background:${c.bg};color:${c.fg};width:32px;height:32px;font-size:10px;font-family:var(--mono)">${ini(s.pitcher)}</div>
    <div style="flex:1"><div style="font-size:13px;font-weight:600">${s.pitcher} ${tb}${rb}${s.opponent?` <span style="font-size:11px;color:var(--text3)">vs ${s.opponent}</span>`:''}</div>
    <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px">${s.date}${t?' · '+t.name:''} · ${s.total}p · ${s.kpct}% K%</div></div>`;
    rel.appendChild(d);
  });
}

function renderTournaments(){
  const el=document.getElementById('tournament-list');if(!el)return;el.innerHTML='';
  S.tournaments.forEach(t=>{
    const ts=S.sessions.filter(s=>s.tournamentId===t.id);
    const gms=ts.filter(s=>s.type==='game');
    const isAct=S.activeTournamentId===t.id;
    const pc=S.pitchers.filter(p=>isAvail(p.id,t.id)).length;
    const limit=t.pitchLimit||DEFAULT_LIMIT;
    const d=document.createElement('div');d.className='t-card'+(isAct?' active-t':'');
    d.innerHTML=`<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px">${t.name}${isAct?' <span class="badge b-teal">Active</span>':''}</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px">${t.dates||''}${t.location?' · '+t.location:''}${t.league?' · '+t.league:''}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">${pc} pitchers · ${ts.length} sessions · ${gms.length} games</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
          <span style="font-size:12px;color:var(--text3)">Pitch limit:</span>
          <input class="limit-input" type="number" value="${limit}" min="1" max="200" onchange="updateTLimit('${t.id}',this.value)" onclick="event.stopPropagation()">
          <span style="font-size:12px;color:var(--text3)">pitches</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0">
        ${!isAct?`<button class="btn btn-success btn-sm" onclick="setActiveT('${t.id}')">Set active</button>`:`<button class="btn btn-sm btn-ghost" onclick="setActiveT(null)">Deactivate</button>`}
        <button class="btn btn-sm btn-danger" onclick="deleteT('${t.id}')">Delete</button>
      </div>
    </div>`;
    el.appendChild(d);
  });
}

function updateTLimit(tid,val){
  const t=S.tournaments.find(t=>t.id===tid);if(!t)return;
  const n=parseInt(val);if(n>0){t.pitchLimit=n;save();renderAll();}
}
function setActiveT(id){S.activeTournamentId=id;save();renderAll();}
function deleteT(id){if(!confirm('Delete this tournament?'))return;S.tournaments=S.tournaments.filter(t=>t.id!==id);if(S.activeTournamentId===id)S.activeTournamentId=null;save();renderAll();}
function addTournament(){
  const name=document.getElementById('t-name').value.trim();if(!name){showAlert('t','Enter a name','danger');return;}
  const lv=parseInt(document.getElementById('t-limit').value)||DEFAULT_LIMIT;
  S.tournaments.push({id:'t'+Date.now(),name,dates:document.getElementById('t-dates').value,location:document.getElementById('t-loc').value,league:document.getElementById('t-league').value,pitchLimit:lv});
  save();renderAll();['t-name','t-dates','t-loc','t-league','t-limit'].forEach(id=>document.getElementById(id).value='');showAlert('t','Tournament added','success');
}
function switchTTab(t,btn){
  document.querySelectorAll('#page-tournaments .tab-bar button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('tt-list').style.display=t==='list'?'block':'none';
  document.getElementById('tt-add').style.display=t==='add'?'block':'none';
}

function renderRoster(){
  const el=document.getElementById('roster-list');if(!el)return;el.innerHTML='';
  const limit=S.activeTournamentId?getLimit(S.activeTournamentId):DEFAULT_LIMIT;
  S.pitchers.forEach((p,i)=>{
    const c=ac(i);const ss=pSess(p.name);const tot=ss.reduce((a,s)=>a+s.total,0);
    const avail=S.activeTournamentId?isAvail(p.id,S.activeTournamentId):true;
    const wp=S.activeTournamentId?weekendP(p.name,S.activeTournamentId):0;
    const rem=Math.max(0,limit-wp);
    const d=document.createElement('div');d.className='row-item';
    d.innerHTML=`<div class="avatar" style="background:${c.bg};color:${c.fg};width:36px;height:36px;font-size:12px;font-family:var(--mono)">${ini(p.name)}</div>
    <div style="flex:1">
      <div style="font-weight:600;font-size:14px">${p.name} <span style="color:var(--text3);font-weight:400;font-size:12px;font-family:var(--mono)">#${p.num}</span> <span class="hb ${p.pos==='LHP'?'lhp':'rhp'}">${p.pos}</span><span class="avail-dot" style="background:${avail?'var(--green)':'var(--red)'}"></span></div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${ss.length} sessions · ${tot} pitches${S.activeTournamentId&&avail?' · '+rem+' left':''}</div>
    </div>
    <button class="btn btn-sm btn-danger" onclick="removePitcher('${p.name.replace(/'/g,"\\'")}')">✕</button>`;
    el.appendChild(d);
  });
}

function removePitcher(name){if(!confirm(`Remove ${name}?`))return;S.pitchers=S.pitchers.filter(p=>p.name!==name);save();renderAll();}
function addPitcher(){
  const name=document.getElementById('r-name').value.trim();if(!name){showAlert('roster','Enter a name','danger');return;}
  const id='p'+Date.now();
  S.pitchers.push({name,num:document.getElementById('r-num').value.trim(),pos:document.getElementById('r-pos').value,id});
  save();renderAll();document.getElementById('r-name').value='';document.getElementById('r-num').value='';showAlert('roster',`${name} added`,'success');
}
function switchRTab(t,btn){
  document.querySelectorAll('#page-roster .tab-bar button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  ['list','stats','add'].forEach(id=>{document.getElementById('rt-'+id).style.display=t===id?'block':'none';});
  if(t==='stats')renderRosterStats();
}
function renderRosterStats(){
  const tid=document.getElementById('roster-t-filter')?.value||'';
  const el=document.getElementById('roster-stats-table');if(!el)return;
  const rows=S.pitchers.map((p,i)=>{
    const ss=pSess(p.name,null,tid||null);const gms=ss.filter(s=>s.type==='game');
    const tot=ss.reduce((a,s)=>a+s.total,0);const str=ss.reduce((a,s)=>a+s.strikes,0);
    const ip=gms.reduce((a,s)=>a+s.ip,0);const er=gms.reduce((a,s)=>a+s.er,0);
    const so=gms.reduce((a,s)=>a+s.so,0);const bb=gms.reduce((a,s)=>a+s.bb,0);
    const c=ac(i);
    return{p,c,tot,kpct:tot>0?Math.round(str/tot*100):0,era:ip>0?(er/ip*9).toFixed(2):'—',so,bb,ip:ip.toFixed(1)};
  }).filter(r=>r.tot>0);
  if(!rows.length){el.innerHTML='<div class="empty">No data yet</div>';return;}
  el.innerHTML=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)">
    <thead><tr style="border-bottom:1px solid var(--border)">
      <th style="padding:8px 6px;text-align:left;color:var(--text3);font-weight:500">Pitcher</th>
      <th style="padding:8px 4px;text-align:center;color:var(--text3);font-weight:500">P</th>
      <th style="padding:8px 4px;text-align:center;color:var(--text3);font-weight:500">K%</th>
      <th style="padding:8px 4px;text-align:center;color:var(--text3);font-weight:500">IP</th>
      <th style="padding:8px 4px;text-align:center;color:var(--text3);font-weight:500">ERA</th>
      <th style="padding:8px 4px;text-align:center;color:var(--text3);font-weight:500">K</th>
      <th style="padding:8px 4px;text-align:center;color:var(--text3);font-weight:500">BB</th>
    </tr></thead><tbody>
    ${rows.map(r=>`<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:9px 6px;white-space:nowrap"><div style="display:flex;align-items:center;gap:5px">
        <div class="avatar" style="background:${r.c.bg};color:${r.c.fg};width:24px;height:24px;font-size:9px">${ini(r.p.name)}</div>
        <span style="font-weight:600;font-family:var(--font)">${r.p.name.split(' ')[0]}</span>
        <span class="hb ${r.p.pos==='LHP'?'lhp':'rhp'}" style="font-size:9px">${r.p.pos}</span>
      </div></td>
      <td style="padding:9px 4px;text-align:center;font-weight:600">${r.tot}</td>
      <td style="padding:9px 4px;text-align:center">${r.kpct}%</td>
      <td style="padding:9px 4px;text-align:center">${r.ip}</td>
      <td style="padding:9px 4px;text-align:center">${r.era}</td>
      <td style="padding:9px 4px;text-align:center">${r.so}</td>
      <td style="padding:9px 4px;text-align:center">${r.bb}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
}

function switchMTab(t,btn){
  document.querySelectorAll('#page-matchup .tab-bar button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('mt-recommend').style.display=t==='recommend'?'block':'none';
  document.getElementById('mt-scout').style.display=t==='scout'?'block':'none';
  if(t==='scout'&&!document.querySelector('.sb-name'))addScoutBatter();
}
function addQuickBatter(){
  qbCount++;const id=`qb${qbCount}`;
  const div=document.createElement('div');div.id=id;
  div.style.cssText='display:grid;grid-template-columns:1fr 68px 68px auto;gap:5px;align-items:center;margin-bottom:6px';
  div.innerHTML=`<input type="text" placeholder="Name" class="qb-name" style="font-size:13px;padding:8px 10px">
  <input type="text" placeholder=".000" class="qb-avg" style="font-size:13px;padding:8px 6px;text-align:center">
  <select class="qb-hand" style="font-size:13px;padding:6px;height:40px"><option value="RHB">RHB</option><option value="LHB">LHB</option></select>
  <button onclick="document.getElementById('${id}').remove()" style="border:none;background:transparent;color:var(--red);font-size:20px;cursor:pointer;padding:2px 4px;line-height:1">✕</button>`;
  document.getElementById('mu-quick').appendChild(div);
}
function addScoutBatter(){
  sbCount++;const id=`sb${sbCount}`;
  const div=document.createElement('div');div.id=id;
  div.style.cssText='display:grid;grid-template-columns:1fr 68px 68px auto;gap:5px;align-items:center;margin-bottom:6px';
  div.innerHTML=`<input type="text" placeholder="Name" class="sb-name" style="font-size:13px;padding:8px 10px">
  <input type="text" placeholder=".000" class="sb-avg" style="font-size:13px;padding:8px 6px;text-align:center">
  <select class="sb-hand" style="font-size:13px;padding:6px;height:40px"><option value="RHB">RHB</option><option value="LHB">LHB</option></select>
  <button onclick="document.getElementById('${id}').remove()" style="border:none;background:transparent;color:var(--red);font-size:20px;cursor:pointer;padding:2px 4px;line-height:1">✕</button>`;
  document.getElementById('scout-list').appendChild(div);
}
function saveScout(){
  const name=document.getElementById('scout-name').value.trim();if(!name){showAlert('matchup','Enter a team name','danger');return;}
  const batters=[];
  document.querySelectorAll('#scout-list > div').forEach(row=>{
    const n=row.querySelector('.sb-name')?.value.trim();const avg=parseFloat(row.querySelector('.sb-avg')?.value)||0;const hand=row.querySelector('.sb-hand')?.value||'RHB';
    if(n)batters.push({name:n,avg,hand});
  });
  if(!batters.length){showAlert('matchup','Add at least one batter','danger');return;}
  const existing=S.scoutedTeams.findIndex(t=>t.name===name);
  const team={id:'st'+Date.now(),name,batters};
  if(existing>=0)S.scoutedTeams[existing]=team;else S.scoutedTeams.push(team);
  save();updateAllSelects();showAlert('matchup',`${name} saved`,'success');
  document.getElementById('scout-name').value='';document.getElementById('scout-list').innerHTML='';sbCount=0;addScoutBatter();
}
function getQuickLineup(){
  const b=[];
  document.querySelectorAll('#mu-quick > div').forEach(row=>{
    const n=row.querySelector('.qb-name')?.value.trim();const avg=parseFloat(row.querySelector('.qb-avg')?.value)||0;const hand=row.querySelector('.qb-hand')?.value||'RHB';
    if(n||avg)b.push({name:n||'Batter',avg,hand});
  });
  return b;
}
function renderMatchup(){
  const tid=document.getElementById('mu-t').value;
  const scoutId=document.getElementById('mu-opp').value;
  const el=document.getElementById('mu-results');
  const limit=tid?getLimit(tid):DEFAULT_LIMIT;
  let lineup=getQuickLineup();
  if(scoutId){const st=S.scoutedTeams.find(t=>t.id===scoutId);if(st&&st.batters.length)lineup=st.batters;}
  const avail=tid?S.pitchers.filter(p=>isAvail(p.id,tid)):S.pitchers;
  if(!avail.length){el.innerHTML='<div class="empty">No pitchers for this tournament</div>';return;}
  const rhb=lineup.filter(b=>b.hand==='RHB').length;
  const lhb=lineup.filter(b=>b.hand==='LHB').length;
  const avgBA=lineup.length>0?lineup.reduce((a,b)=>a+b.avg,0)/lineup.length:0;
  const ranked=avail.map(p=>{
    const gi=pIdx(p.name);
    const allSess=pSess(p.name,'game');const allP=pSess(p.name);
    const wp=weekendP(p.name,tid);const rem=Math.max(0,limit-wp);
    const ip=allSess.reduce((a,s)=>a+s.ip,0);const er=allSess.reduce((a,s)=>a+s.er,0);
    const so=allSess.reduce((a,s)=>a+s.so,0);const bb=allSess.reduce((a,s)=>a+s.bb,0);
    const h=allSess.reduce((a,s)=>a+s.h,0);const ab=allSess.reduce((a,s)=>a+s.ab,0);
    const totP=allP.reduce((a,s)=>a+s.total,0);const totStr=allP.reduce((a,s)=>a+s.strikes,0);
    const era=ip>0?er/ip*9:4.5;const kpct=totP>0?totStr/totP:0.55;
    const kbb=bb>0?so/bb:1.5;const oppBA=ab>0?h/ab:0.28;
    const isLHP=p.pos==='LHP';
    const handAdv=isLHP?(lhb>rhb?0.08:-0.04):(rhb>lhb?0.08:-0.04);
    let score=0;
    score+=(0.70-kpct)*100*0.25;score+=(5.0-era)*3*0.25;
    score+=Math.min(kbb*5,20)*0.20;score+=(0.300-oppBA)*100*0.15;
    score+=Math.min(rem/limit*20,20)*0.15;score+=handAdv*20;
    if(rem<Math.round(limit*0.18))score-=30;else if(rem<Math.round(limit*0.30))score-=12;
    return{p,gi,wp,rem,limit,isLHP,era:ip>0?(er/ip*9).toFixed(2):'—',kpct:Math.round(kpct*100),kbb:bb>0?(so/bb).toFixed(1):'—',oppBA:ab>0?'.'+String(Math.round(h/ab*1000)).padStart(3,'0'):'—',score:Math.max(0,Math.round(score)),hasData:allSess.length>0||allP.length>0};
  }).sort((a,b)=>b.score-a.score);

  const oppSum=lineup.length?`<div class="card" style="margin-bottom:10px">
    <div class="card-title">Opponent lineup</div>
    <div style="display:flex;gap:10px;font-size:12px;margin-bottom:8px;font-family:var(--mono)">
      <span>${lineup.length} batters</span><span><span class="hb rhb">RHB</span> ${rhb}</span><span><span class="hb lhb">LHB</span> ${lhb}</span>
      <span style="color:var(--text3)">Avg: ${avgBA>0?'.'+String(Math.round(avgBA*1000)).padStart(3,'0'):'—'}</span>
    </div>
    <div style="line-height:2">${lineup.map(b=>`<span style="font-size:12px;margin-right:8px;white-space:nowrap">${b.name} <span class="hb ${b.hand==='LHB'?'lhb':'rhb'}">${b.hand}</span>${b.avg>0?' <span style="color:var(--text3);font-family:var(--mono)">.'+String(Math.round(b.avg*1000)).padStart(3,'0')+'</span>':''}</span>`).join('')}</div>
  </div>`:'';

  el.innerHTML=`${oppSum}<div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono);margin-bottom:8px">${lineup.length?'Best matchups':'Pitcher rankings'}</div>`+
    ranked.map((r,rank)=>{
      const rc=rank===0?'rank-1':rank===1?'rank-2':'';
      const ringStyle=rank===0?`border-color:var(--green);color:var(--green);background:var(--green-bg)`:rank===1?`border-color:var(--accent);color:var(--accent);background:var(--accent-bg)`:`border-color:var(--border2);color:var(--text3);background:var(--bg3)`;
      const pct=Math.min(100,Math.round(r.rem/r.limit*100));
      const bcol=pct<=20?'var(--red)':pct<=40?'var(--amber)':'var(--green)';
      const hn=lineup.length?getHandNote(r.isLHP,rhb,lhb):'';
      const c=ac(r.gi>=0?r.gi:0);
      return`<div class="mu-card ${rc}"><div style="display:flex;align-items:flex-start;gap:10px">
        <div class="score-ring" style="${ringStyle}">${r.score}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span style="font-weight:700;font-size:15px">${r.p.name}</span>
            <span class="hb ${r.isLHP?'lhp':'rhp'}">${r.p.pos}</span>
            ${rank===0?'<span class="badge b-green">Top pick</span>':''}
            ${r.rem<Math.round(r.limit*0.18)?'<span class="badge b-red">Low arm</span>':''}
          </div>
          ${hn?`<div style="font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--mono)">${hn}</div>`:''}
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px">
            <div style="background:var(--bg3);border-radius:8px;padding:8px"><div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase">K%</div><div style="font-weight:700;font-size:16px;font-family:var(--mono)">${r.kpct}%</div></div>
            <div style="background:var(--bg3);border-radius:8px;padding:8px"><div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase">ERA</div><div style="font-weight:700;font-size:16px;font-family:var(--mono)">${r.era}</div></div>
            <div style="background:var(--bg3);border-radius:8px;padding:8px"><div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase">K/BB</div><div style="font-weight:700;font-size:16px;font-family:var(--mono)">${r.kbb}</div></div>
          </div>
          <div style="margin-top:10px">
            <div style="display:flex;justify-content:space-between;font-size:12px;font-family:var(--mono);margin-bottom:4px">
              <span style="color:var(--text3)">Weekend: <strong style="color:var(--text)">${r.wp} thrown</strong></span>
              <span style="color:${bcol};font-weight:600">${r.rem}/${r.limit} left</span>
            </div>
            <div class="budget-bar"><div class="budget-fill" style="width:${100-pct}%;background:${bcol}"></div></div>
          </div>
          ${!r.hasData?`<div style="font-size:11px;color:var(--text3);margin-top:6px;font-family:var(--mono)">No stats yet — ranked on pitch budget only</div>`:''}
        </div>
      </div></div>`;
    }).join('');
}
function getHandNote(isLHP,rhb,lhb){
  if(!rhb&&!lhb)return null;
  if(isLHP&&lhb>rhb)return`Same-hand adv · ${lhb} LHBs in lineup`;
  if(!isLHP&&rhb>lhb)return`Same-hand adv · ${rhb} RHBs in lineup`;
  if(isLHP&&rhb>lhb)return`Platoon split · ${rhb} RHBs — opposite-hand edge`;
  if(!isLHP&&lhb>rhb)return`Platoon split · ${lhb} LHBs — opposite-hand edge`;
  return`Even split · ${rhb} RHB · ${lhb} LHB`;
}

load();
</script>
</body>
</html>
